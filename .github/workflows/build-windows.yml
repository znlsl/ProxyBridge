name: Build Windows

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: '10.0.x'

    # No MSVC setup action needed - compile.ps1 auto-detects cl.exe via vswhere.exe,
    # which is pre-installed on every windows-latest runner.

    - name: Install NSIS
      run: |
        choco install nsis -y
      shell: pwsh

    - name: Install NSIS EnVar plugin
      run: |
        $nsisPluginDir = "C:\Program Files (x86)\NSIS\Plugins\x86-unicode"
        $url = "https://nsis.sourceforge.io/mediawiki/images/7/7f/EnVar_plugin.zip"
        $expectedHash = "E9AA92DE351345ED82795251D838F1AE9041BA35AF9D381A5780C7843B01F56A"
        Invoke-WebRequest -Uri $url -OutFile "EnVar.zip" -UseBasicParsing
        $actualHash = (Get-FileHash "EnVar.zip" -Algorithm SHA256).Hash
        if ($actualHash -ne $expectedHash) {
          Write-Error "EnVar.zip SHA256 mismatch! Expected: $expectedHash  Got: $actualHash"
          exit 1
        }
        Expand-Archive -Path "EnVar.zip" -DestinationPath "EnVar"
        Copy-Item "EnVar\Plugins\x86-unicode\EnVar.dll" -Destination $nsisPluginDir -Force
        Write-Host "EnVar plugin installed successfully"
      shell: pwsh

    - name: Download WinDivert
      run: |
        $url = "https://github.com/basil00/WinDivert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip"
        $expectedHash = "63CB41763BB4B20F600B6DE04E991A9C2BE73279E317D4D82F237B150C5F3F15"
        Invoke-WebRequest -Uri $url -OutFile "WinDivert.zip" -UseBasicParsing
        $actualHash = (Get-FileHash "WinDivert.zip" -Algorithm SHA256).Hash
        if ($actualHash -ne $expectedHash) {
          Write-Error "WinDivert.zip SHA256 mismatch! Expected: $expectedHash  Got: $actualHash"
          exit 1
        }
        Expand-Archive -Path "WinDivert.zip" -DestinationPath "C:\"
      shell: pwsh

    - name: Verify WinDivert installation
      run: |
        if (Test-Path "C:\WinDivert-2.2.2-A") {
          Write-Host "WinDivert installed successfully"
          Get-ChildItem "C:\WinDivert-2.2.2-A" -Recurse | Select-Object FullName
        } else {
          Write-Error "WinDivert installation failed"
          exit 1
        }
      shell: pwsh

    - name: Build project
      run: |
        cd Windows
        .\compile.ps1 -NoSign
      shell: pwsh

    - name: Upload artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ProxyBridge-Build-${{ github.sha }}
        path: Windows/output/
        retention-days: 30

    - name: List output files
      run: |
        Write-Host "`nBuild artifacts:"
        Get-ChildItem Windows/output -Recurse | ForEach-Object {
          $size = [math]::Round($_.Length/1MB, 2)
          Write-Host "  $($_.Name) - $size MB"
        }
      shell: pwsh
